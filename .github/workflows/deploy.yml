name: Deploy para Firebase

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: CI=false npm run build

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Criar credencial Firebase
        run: |
          printf '%s' '${{ secrets.FIREBASE_PRIVATE_KEY }}' > private_key.pem
          node -e "
            const fs = require('fs');
            const key = fs.readFileSync('private_key.pem', 'utf8');
            const cred = {
              type: 'service_account',
              project_id: '${{ secrets.FIREBASE_PROJECT_ID }}',
              private_key: key,
              client_email: '${{ secrets.FIREBASE_CLIENT_EMAIL }}'
            };
            fs.writeFileSync('firebase-key.json', JSON.stringify(cred));
          "

      - name: Deploy no Firebase
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json
